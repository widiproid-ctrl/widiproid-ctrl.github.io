<!DOCTYPE html>
<html lang="id">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widi Store - Top Up ML & FF Murah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        utama: '#00B956',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .scroll-smooth { scroll-behavior: smooth; }
        }
    </style>
</head>
<body class="bg-gray-100 scroll-smooth">

    <!-- HEADER -->
    <header class="bg-utama text-white py-4 px-4 shadow-md">
        <div class="container mx-auto">
            <h1 class="text-[22px] font-bold text-center">WIDI STORE</h1>
            <p class="text-center text-white/90 text-sm mt-1">Top Up Game & Voucher Murah, Aman, Cepat</p>
            <div class="mt-3">
                <input type="text" placeholder="Cari game favoritmu..." class="w-full px-3 py-2 rounded-lg text-gray-800 text-sm">
            </div>
        </div>
    </header>

    <!-- HALAMAN UTAMA -->
    <main class="container mx-auto px-4 py-6" id="halamanUtama">
        <h2 class="text-lg font-bold mb-4">Pilih Game</h2>
        <div class="grid grid-cols-2 gap-4">
            <!-- MOBILE LEGENDS -->
            <div class="bg-white rounded-lg shadow p-3 cursor-pointer hover:shadow-lg transition" onclick="bukaHalaman('ml')">
                <img src="https://upload.wikimedia.org/wikipedia/id/thumb/6/68/Mobile_Legends:_Bang_Bang_logo.svg/800px-Mobile_Legends:_Bang_Bang_logo.svg.png" class="w-full h-28 object-contain mb-2">
                <h3 class="font-bold text-center text-blue-600">Mobile Legends</h3>
                <p class="text-green-600 text-xs text-center">Diamond MLBB</p>
            </div>
            <!-- FREE FIRE -->
            <div class="bg-white rounded-lg shadow p-3 cursor-pointer hover:shadow-lg transition" onclick="bukaHalaman('ff')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Free_Fire_logo.svg/800px-Free_Fire_logo.svg.png" class="w-full h-28 object-contain mb-2">
                <h3 class="font-bold text-center text-orange-500">Free Fire</h3>
                <p class="text-green-600 text-xs text-center">Diamond FF</p>
            </div>
        </div>
    </main>
